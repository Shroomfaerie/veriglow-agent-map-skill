<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Step 1 -->
  <g transform="translate(20, 20)" filter="url(#card-shadow)">
    <rect width="250" height="160" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect width="250" height="4" rx="2" fill="#10B981" y="0" clip-path="inset(0 round 14px 14px 0 0)"/>
    <circle cx="32" cy="40" r="16" fill="#ECFDF5"/>
    <text x="32" y="45" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14" fill="#10B981" text-anchor="middle">1</text>
    <text x="58" y="45" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="15" fill="#111827">Agent gets a task</text>
    <text x="32" y="80" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="13" fill="#6B7280">
      <tspan x="24" dy="0">"Get bond trading data</tspan>
      <tspan x="24" dy="18">from the Shanghai Stock</tspan>
      <tspan x="24" dy="18">Exchange"</tspan>
    </text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(280, 90)">
    <line x1="0" y1="10" x2="30" y2="10" stroke="#10B981" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="30,5 40,10 30,15" fill="#10B981"/>
  </g>

  <!-- Step 2 -->
  <g transform="translate(325, 20)" filter="url(#card-shadow)">
    <rect width="250" height="160" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect width="250" height="4" rx="2" fill="#3B82F6" y="0" clip-path="inset(0 round 14px 14px 0 0)"/>
    <circle cx="32" cy="40" r="16" fill="#EFF6FF"/>
    <text x="32" y="45" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14" fill="#3B82F6" text-anchor="middle">2</text>
    <text x="58" y="45" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="15" fill="#111827">Looks up Agent Map</text>
    <text x="32" y="76" font-family="'Courier New', monospace" font-weight="500" font-size="11" fill="#10B981">
      <tspan x="24" dy="0">veri-glow.com/</tspan>
    </text>
    <text x="32" y="95" font-family="'Courier New', monospace" font-weight="400" font-size="11" fill="#6B7280">
      <tspan x="24" dy="0">www.sse.com.cn/market/</tspan>
      <tspan x="24" dy="16">bonddata/overview/day/</tspan>
    </text>
    <text x="24" y="135" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="12" fill="#9CA3AF">Gets API docs + params + recipes</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(585, 90)">
    <line x1="0" y1="10" x2="30" y2="10" stroke="#10B981" stroke-width="2" stroke-dasharray="4 3"/>
    <polygon points="30,5 40,10 30,15" fill="#10B981"/>
  </g>

  <!-- Step 3 -->
  <g transform="translate(630, 20)" filter="url(#card-shadow)">
    <rect width="250" height="160" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <rect width="250" height="4" rx="2" fill="#34D399" y="0" clip-path="inset(0 round 14px 14px 0 0)"/>
    <circle cx="32" cy="40" r="16" fill="#ECFDF5"/>
    <text x="32" y="45" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="14" fill="#10B981" text-anchor="middle">3</text>
    <text x="58" y="45" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="15" fill="#111827">Calls the API</text>
    <text x="32" y="76" font-family="'Courier New', monospace" font-weight="400" font-size="11" fill="#6B7280">
      <tspan x="24" dy="0">curl "https://sse.com.cn</tspan>
      <tspan x="24" dy="16">/js/common/sseBond498</tspan>
      <tspan x="24" dy="16">Fixed.js?searchDate=</tspan>
      <tspan x="24" dy="16">2025-02-11"</tspan>
    </text>
    <text x="24" y="143" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="12" fill="#10B981">200 OK  17 rows  187ms</text>
  </g>
</svg>
